name: Sync superpowers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependency
        run: python -m pip install --upgrade pip pyyaml

      - name: Sync allowlisted superpowers skills
        run: ./scripts/sync_superpowers.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/sync-superpowers
          delete-branch: true
          commit-message: "chore: sync superpowers from upstream"
          title: "chore: sync superpowers from upstream"
          body: |
            Automated sync from `obra/superpowers`.

            This workflow:
            - updates allowlisted `SKILL.md` files
            - preserves local `agents/openai.yaml`
            - refreshes `claude/skills/`
            - runs `make validate-all`
